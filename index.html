<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Get Started</title>
  <!--
    Self-hosted, pre-compiled build — no third-party CDN, no in-browser Babel.
    - React 18.3.1 UMD is vendored in ./vendor (pulled from npm, not a CDN).
    - The app is authored in src/app.jsx and compiled to ./app.js with `npm run build`.
    Why: the form used to transpile JSX in the browser via @babel/standalone loaded
    UNPINNED from a CDN, which broke on 2026-06-16 when Babel 8 shipped as "latest".
    To edit the form: change src/app.jsx, run `npm run build`, then commit app.js.
  -->
  <script src="./vendor/react.production.min.js"></script>
  <script src="./vendor/react-dom.production.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#F4F5F9;min-height:100vh;font-family:'Outfit',sans-serif;}
    @keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
    @keyframes count-up{0%{opacity:0;transform:scale(0.8);}100%{opacity:1;transform:scale(1);}}
    @keyframes logo-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
  </style>
  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window,document,"clarity","script","qo6gcqjdc7");</script>
</head>
<body>
  <div id="root"></div>
  <script src="./app.js"></script>
</body>
</html>
